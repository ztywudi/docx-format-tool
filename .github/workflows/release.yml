# GitHub Actions 自动发布配置
# 当用户推送 tag 时，自动创建 Release 并上传打包文件（Windows exe 和 Python 包）

name: 发布底稿整理助手

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0 这样的 tag 时触发

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
    
    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: 打包为 Windows 可执行文件
      run: |
        pyinstaller --onefile --windowed --name="底稿整理助手" format_tool.py
    
    - name: 上传 Windows 可执行文件
      uses: actions/upload-artifact@v3
      with:
        name: 底稿整理助手-windows-exe
        path: dist/底稿整理助手.exe
  
  build-python-package:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
    
    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install setuptools wheel
    
    - name: 构建 Python 包
      run: |
        python setup.py sdist bdist_wheel
    
    - name: 上传 Python 包
      uses: actions/upload-artifact@v3
      with:
        name: python-package
        path: dist/
  
  create-release:
    needs: [build-windows, build-python-package]
    runs-on: ubuntu-latest
    
    steps:
    - name: 下载所有构建产物
      uses: actions/download-artifact@v3
    
    - name: 创建 Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: 底稿整理助手 ${{ github.ref }}
        body: |
          ## 底稿整理助手 ${{ github.ref }}
          
          ### 功能特点
          - 纯本地运行，无需联网
          - 支持模板导入/管理/应用
          - 一键调整报告格式
          - 自动备份原文件
          
          ### 下载与使用
          
          #### Windows 用户
          1. 下载 `底稿整理助手.exe`
          2. 双击运行即可（无需安装 Python）
          
          #### 其他用户（Mac/Linux）
          1. 下载 Python 包：`docx-format-tool-*.tar.gz` 或 `docx_format_tool-*.whl`
          2. 安装：`pip install docx-format-tool-*.tar.gz`
          3. 运行：`format-tool`
          
          ### 更新日志
          - 初始版本发布
        draft: false
        prerelease: false
    
    - name: 上传 Windows exe
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: 底稿整理助手-windows-exe/底稿整理助手.exe
        asset_name: 底稿整理助手.exe
        asset_content_type: application/octet-stream
    
    - name: 上传 Python tar.gz
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: python-package/docx-format-tool-1.0.0.tar.gz
        asset_name: docx-format-tool-1.0.0.tar.gz
        asset_content_type: application/gzip
    
    - name: 上传 Python wheel
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: python-package/docx_format_tool-1.0.0-py3-none-any.whl
        asset_name: docx_format_tool-1.0.0-py3-none-any.whl
        asset_content_type: application/octet-stream
