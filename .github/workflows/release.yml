# GitHub Actions 自动发布配置
# 当用户推送 tag 时，自动创建 Release

name: 创建 Release

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0 这样的 tag 时触发

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
    
    - name: 创建 Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: 底稿整理助手 ${{ github.ref }}
        body: |
          ## 底稿整理助手 ${{ github.ref }}
          
          ### 功能特点
          - 纯本地运行，无需联网
          - 支持模板导入/管理/应用
          - 一键调整报告格式
          - 自动备份原文件
          
          ### 安装与使用
          
          #### 方法1：下载源代码使用
          1. 下载源代码（Source code）
          2. 安装依赖：`pip install -r requirements.txt`
          3. 运行：`python format_tool.py`
          
          #### 方法2：安装 Python 包
          1. 下载 `docx_format_tool-*.whl` 或 `docx-format-tool-*.tar.gz`
          2. 安装：`pip install docx_format_tool-*.whl`
          3. 运行：`format-tool`
          
          #### 方法3：Windows 用户（需要自己打包 exe）
          1. 安装 Python 和依赖
          2. 运行：`pyinstaller --onefile --windowed format_tool.py`
          3. 在 dist 目录找到 exe 文件
          
          ### 更新日志
          - 初始版本发布
        draft: false
        prerelease: false
